services:
  - type: web
    name: micro-carbon-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DISCOM_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
